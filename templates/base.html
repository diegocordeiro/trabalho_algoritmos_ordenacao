<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Benchmark de Ordenação{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --fundo-1: #f4f9ff;
      --fundo-2: #e7f1ff;
      --primario: #0b5ed7;
      --acento: #198754;
    }
    body {
      background: radial-gradient(circle at top right, var(--fundo-2), var(--fundo-1) 45%, #ffffff 100%);
      min-height: 100vh;
    }
    .hero-card {
      border: 0;
      background: linear-gradient(120deg, #0b5ed7, #0d6efd, #3d8bfd);
      color: #fff;
      box-shadow: 0 14px 40px rgba(13, 110, 253, 0.2);
    }
    .panel-card {
      border: 0;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      border-radius: 14px;
    }
    .section-title {
      font-size: .95rem;
      letter-spacing: .03em;
      font-weight: 700;
      color: #344054;
      text-transform: uppercase;
      margin-bottom: .65rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: #0b4db3;">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/">Comparação de Algoritmos de Ordenação</a>
  </div>
</nav>
<main class="container py-4 pb-5">
  {% block content %}{% endblock %}
</main>
</body>
</html>
