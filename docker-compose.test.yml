version: "3.9"

# ============================================================
# Compose para TESTE LOCAL
# Auto-suficiente: inclui nginx proprio, nao depende de prod_net
# Acesse: http://localhost/comparacao_algoritmos/
# ============================================================

services:
  comparacao:
    build: .
    container_name: comparacao_algoritmos_test
    restart: unless-stopped
    env_file:
      - .env.comparacao
    environment:
      - DJANGO_SETTINGS_MODULE=projeto.settings_prod
      - DEBUG=False
      - DB_DIR=/data
    volumes:
      - ./data:/data
      - comparacao_staticfiles:/app/staticfiles
      - ./media:/app/media
    mem_limit: 128m
    networks:
      - comparacao_net

  nginx:
    image: nginx:latest
    container_name: comparacao_nginx_test
    depends_on:
      - comparacao
    volumes:
      - ./nginx.test.conf:/etc/nginx/conf.d/default.conf
      - comparacao_staticfiles:/comparacao_staticfiles
    ports:
      - "80:80"
    mem_limit: 64m
    networks:
      - comparacao_net

networks:
  comparacao_net:
    driver: bridge

volumes:
  comparacao_staticfiles: